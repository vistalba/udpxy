name: Build & Push Docker Images

on:
  push:
    branches: [master, debian, alpine]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - branch: master
            tag: vistalba/udpxy:latest
          - branch: debian
            tag: vistalba/udpxy:latest-debian
          - branch: alpine
            tag: vistalba/udpxy:latest-alpine
    if: github.event_name == 'workflow_dispatch' || github.ref_name == matrix.branch

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ matrix.tag }}
          cache-from: type=gha,scope=${{ matrix.branch }}
          cache-to: type=gha,scope=${{ matrix.branch }},mode=max
